name: Compilar AxionOS S20 FE (r8q)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 🧹 Maximizar espacio en el servidor
      uses: easimon/maximize-build-space@master
      with:
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        swap-size-mb: 8192

    - name: 🛠️ Instalar dependencias esenciales
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt-get update -y
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3
        sudo apt-get clean
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo

    - name: 📥 Descargar código base y Manifiesto
      run: |
        mkdir -p ~/rom
        cd ~/rom
        ~/bin/repo init -u https://github.com/AxionAOSP/android.git --depth=1
        git clone https://github.com/catproyt/compilacion-s20fe.git .repo/local_manifests
        ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: 🚀 Iniciar Compilación
      run: |
        cd ~/rom
        export PATH="~/bin:$PATH"
        . build/envsetup.sh
        export SKIP_ABI_CHECKS=true
        export AXION_MAINTAINER="catpro"
        axion r8q user gms
        ax -br -j24

    - name: 📦 Subir la ROM terminada
      uses: actions/upload-artifact@v4
      with:
        name: AxionOS-S20FE-r8q-catpro
        path: ~/rom/out/target/product/r8q/AxionOS*.zip
