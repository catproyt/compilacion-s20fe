name: Compilar AxionOS S20 FE (r8q)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 🧹 Maximizar espacio en el servidor
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: 🛠️ Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo

    - name: 📥 Descargar código base y Manifiesto
      run: |
        mkdir -p ~/rom
        cd ~/rom
        ~/bin/repo init -u https://github.com/AxionAOSP/android.git -b bka --depth=1
        
        # Aquí ya puse tu usuario catproyt directamente
        git clone https://github.com/catproyt/compilacion-s20fe.git .repo/local_manifests
        
        ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: 🚀 Iniciar Compilación
      run: |
        cd ~/rom
        export PATH="~/bin:$PATH"
        source build/envsetup.sh
        
        export AXION_MAINTAINER="CATPRO"
        export TARGET_MAINTAINER="CATPRO"
        
        lunch axion_r8q-userdebug
        mka axion -j$(nproc --all)

    - name: 📦 Subir la ROM terminada
      uses: actions/upload-artifact@v4
      with:
        name: AxionOS-S20FE-r8q
        path: ~/rom/out/target/product/r8q/AxionOS*.zip
        
